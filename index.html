<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pasco Site Tracker</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://server.arcgisonline.com">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="./styles.css?v=20260522-1">
  </head>
  <body>
    <section class="access-gate" id="accessGate" hidden>
      <form class="access-card" id="accessForm">
        <div>
          <span class="access-kicker">Private Tracker</span>
          <h1>Pasco Site Tracker</h1>
          <p>Sign in with an approved tracker email.</p>
        </div>
        <label>
          Email
          <input id="authEmail" type="email" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="authPassword" type="password" autocomplete="current-password" required>
        </label>
        <p class="access-error" id="accessError"></p>
        <button class="primary-btn" type="submit">Sign In</button>
      </form>
    </section>

    <header class="topbar">
      <div class="brand" aria-label="Pasco Site Tracker">
        <strong>Pasco Site Tracker</strong>
        <span>SR-52 Corridor</span>
      </div>

      <div class="top-actions">
        <button class="primary-btn" id="addParcelBtn" type="button">+ Add Pin</button>
        <button class="ghost-btn" id="importBtn" type="button">Import</button>
        <button class="ghost-btn" id="exportBtn" type="button">Export</button>
        <button class="ghost-btn" id="backupBtn" type="button">Backup</button>
      </div>

      <div class="view-toggle" id="viewToggle" aria-label="View mode">
        <button class="active" data-view="map" type="button">Map</button>
        <button data-view="pipeline" type="button">Pipeline</button>
        <button data-view="list" type="button">List</button>
      </div>

      <div class="pin-visibility" aria-label="Map pins">
        <button class="active" id="targetsBtn" type="button">Targets</button>
        <button id="compsBtn" type="button">Sales Comps</button>
      </div>

      <nav class="status-filters" id="statusFilters" aria-label="Status filters"></nav>

      <div class="toolbar-tail">
        <label class="search-wrap">
          <span>Search</span>
          <input id="searchInput" type="search" autocomplete="off">
        </label>
        <button class="bell-btn" id="notificationBtn" type="button" aria-label="Needs attention">
          <span>!</span>
          <strong id="notificationCount">0</strong>
        </button>
        <div class="segmented" aria-label="Map layer">
          <button id="satelliteBtn" class="active" type="button">Satellite</button>
          <button id="roadBtn" type="button">Road</button>
        </div>
        <button class="ghost-btn" id="focusBtn" type="button">Focus</button>
        <button class="ghost-btn user-btn" id="userBtn" type="button">User</button>
        <label class="archive-toggle">
          <input id="showArchived" type="checkbox">
          <span>Archived</span>
        </label>
        <button class="ghost-btn" id="saveBtn" type="button">Save</button>
        <div class="sync-state" id="syncState">Loading</div>
      </div>
    </header>

    <main>
      <div id="map" aria-label="Parcel map"></div>
      <aside class="worklist" id="worklist" aria-label="Parcel worklist"></aside>
      <aside class="summary-bar" id="summaryBar"></aside>
      <section class="pipeline-view" id="pipelineView" aria-label="Acquisition pipeline"></section>
      <section class="list-view" id="listView" aria-label="Parcel list"></section>
      <aside class="notification-drawer" id="notificationDrawer" aria-live="polite"></aside>
      <aside class="side-panel" id="sidePanel" aria-live="polite"></aside>
    </main>

    <button class="focus-exit" id="focusExitBtn" type="button">Exit Focus</button>

    <dialog class="modal" id="parcelModal">
      <form method="dialog" class="modal-shell" id="parcelForm">
        <div class="modal-head">
          <h2>Add Pin</h2>
          <button class="icon-btn" id="closeParcelModal" type="button" aria-label="Close">x</button>
        </div>
        <div class="modal-body">
          <div class="field wide">
            <label for="newAddress">Address</label>
            <div class="inline-field">
              <input id="newAddress" name="address" type="text" autocomplete="street-address" placeholder="801 E Whiting St">
              <button class="ghost-btn" id="geocodeBtn" type="button">Locate</button>
            </div>
            <div class="field-note geo-results" id="geocodeResult"></div>
          </div>
          <div class="field">
            <label for="newCity">City</label>
            <input id="newCity" name="city" type="text" autocomplete="address-level2" placeholder="Tampa">
          </div>
          <div class="field">
            <label for="newState">State</label>
            <input id="newState" name="state" type="text" autocomplete="address-level1" value="FL">
          </div>
          <div class="field">
            <label for="newZip">Zip</label>
            <input id="newZip" name="zip" type="text" autocomplete="postal-code" placeholder="33602">
          </div>
          <div class="field">
            <label for="newLat">Latitude</label>
            <input id="newLat" name="lat" type="number" step="0.000001">
          </div>
          <div class="field">
            <label for="newLng">Longitude</label>
            <input id="newLng" name="lng" type="number" step="0.000001">
          </div>
          <div class="field">
            <label>Manual Placement</label>
            <button class="ghost-btn field-button" id="placeNewPinBtn" type="button">Place On Map</button>
            <button class="ghost-btn field-button" id="mapCenterBtn" type="button">Use Map Center</button>
          </div>
          <div class="field">
            <label for="newStatus">Status</label>
            <select id="newStatus" name="status"></select>
          </div>
          <div class="field">
            <label for="newType">Type</label>
            <input id="newType" name="type" type="text" value="Land">
          </div>
          <div class="field">
            <label for="newZoning">Zoning</label>
            <input id="newZoning" name="zoning" type="text">
          </div>
          <div class="field">
            <label for="newAcres">Acres</label>
            <input id="newAcres" name="acres" type="number" step="0.01">
          </div>
          <div class="field">
            <label for="newAssessedValue">Assessed Value</label>
            <input id="newAssessedValue" name="assessedValue" type="number" step="1">
          </div>
          <div class="field">
            <label for="newTaxes">Taxes</label>
            <input id="newTaxes" name="taxes" type="number" step="1">
          </div>
          <div class="field">
            <label for="newSaleDate">Sale Date</label>
            <input id="newSaleDate" name="saleDate" type="date">
          </div>
          <div class="field">
            <label for="newSoldPrice">Sold Price</label>
            <input id="newSoldPrice" name="soldPrice" type="number" step="1">
          </div>
          <div class="field wide">
            <label for="newCrexiLink">Property Link</label>
            <input id="newCrexiLink" name="crexiLink" type="url" placeholder="https://">
          </div>
          <div class="field">
            <label for="newOwner">Owner</label>
            <input id="newOwner" name="owner" type="text">
          </div>
          <div class="field">
            <label for="newContact">Contact</label>
            <input id="newContact" name="contact" type="text">
          </div>
          <div class="field">
            <label for="newPhone">Phone</label>
            <input id="newPhone" name="phone" type="tel">
          </div>
          <div class="field">
            <label for="newEmail">Email</label>
            <input id="newEmail" name="email" type="email">
          </div>
          <div class="field wide">
            <label for="newNotes">Notes</label>
            <textarea id="newNotes" name="notes" rows="4"></textarea>
          </div>
        </div>
        <div class="modal-foot">
          <button class="ghost-btn" id="cancelParcelBtn" type="button">Cancel</button>
          <button class="primary-btn" type="submit">Add Pin</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="importModal">
      <form method="dialog" class="modal-shell" id="importForm">
        <div class="modal-head">
          <h2>Import Parcels</h2>
          <button class="icon-btn" id="closeImportModal" type="button" aria-label="Close">x</button>
        </div>
        <div class="modal-body one-col">
          <div class="field wide">
            <label for="importFile">Excel, CSV, or tracker JSON</label>
            <input id="importFile" type="file" accept=".xlsx,.xls,.csv,.json">
            <p class="field-note" id="importResult"></p>
          </div>
          <div class="import-preview" id="importPreview"></div>
        </div>
        <div class="modal-foot">
          <button class="ghost-btn" id="cancelImportBtn" type="button">Cancel</button>
          <button class="primary-btn" id="commitImportBtn" type="button" disabled>Add New Parcels</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./sales-comps.js?v=20260522-1"></script>
    <script src="./supabase-config.js?v=20260522-1"></script>
    <script src="./app.js?v=20260522-1"></script>
  </body>
</html>
